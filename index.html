function Depenses({ expenses, setExpenses }) {
  const blank = { amount:'', category:'Nourriture', date:todayISO(), type:'Variable', note:'' };
  const [form, setForm] = useState(blank);
  const [editingId, setEditingId] = useState(null);
  const CATS = ['Nourriture','Transport','Business','École','Loisirs','Autre'];

  const openEdit = exp => {
    setEditingId(exp.id);
    setForm({ amount:String(exp.amount), category:exp.category, date:exp.date, type:exp.type, note:exp.note||'' });
    window.scrollTo({ top:0, behavior:'smooth' });
  };
  const closeForm = () => { setEditingId(null); setForm({...blank,date:todayISO()}); };

  const add = () => {
    if (!form.amount) return;
    if (editingId) {
      setExpenses(p=>p.map(e=>e.id===editingId?{...e,...form,amount:+form.amount}:e));
      closeForm();
    } else {
      setExpenses(p=>[...p,{...form,amount:+form.amount,id:genId()}]);
      setForm({...blank,date:todayISO()});
    }
  };

  const now = todayISO();
  const weekAgo = (() => { const d=new Date(); d.setDate(d.getDate()-7); return d.toISOString().split('T')[0]; })();
  const monthStart = (() => { const d=new Date(); d.setDate(1); return d.toISOString().split('T')[0]; })();

  const todayTotal = expenses.filter(e=>e.date===now).reduce((s,e)=>s+e.amount,0);
  const weekTotal  = expenses.filter(e=>e.date>=weekAgo).reduce((s,e)=>s+e.amount,0);
  const monthTotal = expenses.filter(e=>e.date>=monthStart).reduce((s,e)=>s+e.amount,0);

  const catTotals = {};
  CATS.forEach(c => { catTotals[c] = expenses.filter(e=>e.date>=monthStart&&e.category===c).reduce((s,x)=>s+x.amount,0); });
  const maxVal = Math.max(...Object.values(catTotals), 1);

  const sorted = [...expenses].sort((a,b)=>new Date(b.date)-new Date(a.date));

  return (
    <div>
      {/* Stats */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:14, marginBottom:24 }} className="grid-3">
        <StatCard icon="☀️" value={`${todayTotal.toLocaleString('fr-FR')} FCFA`} label="Aujourd'hui"      color="#F5C518" />
        <StatCard icon="📅" value={`${weekTotal.toLocaleString('fr-FR')} FCFA`}  label="7 derniers jours" color="#60a5fa" />
        <StatCard icon="📆" value={`${monthTotal.toLocaleString('fr-FR')} FCFA`} label="Ce mois"          color="#4ade80" />
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20, marginBottom:24 }} className="grid-2">
        {/* Bar chart */}
        <div className="card" style={{ padding:20 }}>
          <p style={{ fontFamily:'Syne', fontWeight:700, fontSize:13, textTransform:'uppercase', letterSpacing:.8, marginBottom:16 }}>
            Dépenses par catégorie (ce mois)
          </p>
          {CATS.filter(c=>catTotals[c]>0).length===0 ? (
            <EmptyState icon="📊" msg="Aucune dépense ce mois." />
          ) : CATS.map(cat => catTotals[cat]===0 ? null : (
            <div key={cat} style={{ marginBottom:12 }}>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:5 }}>
                <span style={{ fontSize:13, color:CAT_COLORS[cat], fontWeight:500 }}>{cat}</span>
                <span style={{ fontSize:13, fontWeight:600 }}>{catTotals[cat].toLocaleString('fr-FR')} FCFA</span>
              </div>
              <div style={{ background:'#1a2235', borderRadius:999, height:10, overflow:'hidden' }}>
                <div style={{
                  background: CAT_COLORS[cat],
                  height:10, borderRadius:999,
                  width:`${(catTotals[cat]/maxVal)*100}%`,
                  transition:'width .5s ease',
                  boxShadow:`0 0 8px ${CAT_COLORS[cat]}60`,
                }} />
              </div>
            </div>
          ))}
        </div>

        {/* Add / Edit form */}
        <div className="card" style={{ padding:20, border: editingId ? '1px solid rgba(245,197,24,.35)' : undefined }}>
          <p style={{ fontFamily:'Syne', fontWeight:700, fontSize:13, textTransform:'uppercase', letterSpacing:.8, marginBottom:16 }}>
            {editingId ? '✏️ Modifier la dépense' : 'Ajouter une dépense'}
          </p>
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            <input type="number" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})}
              placeholder="Montant en FCFA *" min={0} />
            <select value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>
              {CATS.map(c=><option key={c}>{c}</option>)}
            </select>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
              <input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} />
              <select value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>
                <option value="Variable">Variable</option>
                <option value="Fixe">Fixe</option>
              </select>
            </div>
            <input value={form.note} onChange={e=>setForm({...form,note:e.target.value})} placeholder="Note (optionnel)" />
            <div style={{ display:'flex', gap:8 }}>
              <button className="btn-gold" onClick={add} style={{ flex:1 }}>
                {editingId ? 'Enregistrer' : 'Ajouter la dépense'}
              </button>
              {editingId && <button className="btn-ghost" onClick={closeForm}>Annuler</button>}
            </div>
          </div>
        </div>
      </div>

      {/* History */}
      <div className="card" style={{ padding:20 }}>
        <p style={{ fontFamily:'Syne', fontWeight:700, fontSize:13, textTransform:'uppercase', letterSpacing:.8, marginBottom:16 }}>
          Historique ({sorted.length} entrée{sorted.length!==1?'s':''})
        </p>
        {sorted.length===0 ? <EmptyState icon="🧾" msg="Aucune dépense enregistrée." /> : (
          sorted.slice(0,30).map(e=>(
            <div key={e.id} style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 0', borderBottom:'1px solid var(--border)',
              background: editingId===e.id ? 'rgba(245,197,24,.04)' : undefined, borderRadius: editingId===e.id ? 6 : undefined }}>
              <div style={{ width:10, height:10, borderRadius:'50%', background:CAT_COLORS[e.category]||'#6b7280', flexShrink:0 }} />
              <div style={{ flex:1, minWidth:0 }}>
                <p style={{ margin:0, fontSize:14 }}>{e.note||e.category}</p>
                <p style={{ margin:0, fontSize:11, color:'var(--muted)' }}>{fmtDate(e.date)} · {e.category} · {e.type}</p>
              </div>
              <span style={{ fontWeight:700, color:'#F5C518', whiteSpace:'nowrap', fontSize:14 }}>
                {e.amount.toLocaleString('fr-FR')} FCFA
              </span>
              <button className="btn-icon" title="Modifier" onClick={()=>openEdit(e)}
                style={{ color: editingId===e.id?'#F5C518':undefined }}>✏️</button>
              <button className="btn-icon" onClick={()=>setExpenses(p=>p.filter(x=>x.id!==e.id))}>✕</button>
            </div>
          ))
        )}
      </div>
    </div>
  );
}

function Abonnements({ subscriptions, setSubscriptions }) {
  const blank = { name:'', amount:'', startDate:todayISO(), cycle:'Mensuel', category:'Business' };
  const [form, setForm] = useState(blank);
  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null);

  const openAdd = () => { setEditingId(null); setForm(blank); setShowForm(true); };
  const openEdit = sub => {
    setEditingId(sub.id);
    setForm({ name:sub.name, amount:String(sub.amount), startDate:sub.startDate||todayISO(), cycle:sub.cycle||'Mensuel', category:sub.category });
    setShowForm(true);
  };
  const closeForm = () => { setShowForm(false); setEditingId(null); setForm(blank); };

  const save = () => {
    if (!form.name||!form.amount) return;
    const nextRenewal = computeNextRenewal(form.startDate, form.cycle);
    if (editingId) {
      setSubscriptions(p=>p.map(s=>s.id===editingId
        ? {...s,...form,amount:+form.amount,nextRenewal}
        : s));
    } else {
      setSubscriptions(p=>[...p,{...form,amount:+form.amount,nextRenewal,id:genId()}]);
    }
    closeForm();
  };

  /* Marquer comme payé → avancer nextRenewal d'un cycle */
  const markPaid = sub => {
    const next = advanceCycle(sub.nextRenewal || computeNextRenewal(sub.startDate, sub.cycle), sub.cycle);
    setSubscriptions(p=>p.map(s=>s.id===sub.id ? {...s, nextRenewal:next, lastPaid:todayISO()} : s));
  };

  /* Monthly-equivalent total */
  const monthlyTotal = subscriptions.reduce((s,x)=>s+monthlyEquiv(x.amount, x.cycle||'Mensuel'),0);

  const sorted = [...subscriptions].sort((a,b)=>{
    const da = a.nextRenewal || computeNextRenewal(a.startDate, a.cycle||'Mensuel');
    const db = b.nextRenewal || computeNextRenewal(b.startDate, b.cycle||'Mensuel');
    return new Date(da)-new Date(db);
  });

  const CYCLE_COLORS = { Mensuel:'#60a5fa', Trimestriel:'#a78bfa', Annuel:'#34d399', Hebdomadaire:'#fb923c' };

  return (
    <div>
      {/* Stats row */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))', gap:14, marginBottom:20 }}>
        <div className="stat-card">
          <span className="stat-icon">💳</span>
          <div>
            <div className="stat-value" style={{ color:'#F5C518' }}>{Math.round(monthlyTotal).toLocaleString('fr-FR')} FCFA</div>
            <div className="stat-label">Équivalent mensuel total</div>
          </div>
        </div>
        <div className="stat-card">
          <span className="stat-icon">📆</span>
          <div>
            <div className="stat-value" style={{ color:'#4ade80' }}>{Math.round(monthlyTotal*12).toLocaleString('fr-FR')} FCFA</div>
            <div className="stat-label">Projection annuelle</div>
          </div>
        </div>
        <div className="stat-card">
          <span className="stat-icon">🔔</span>
          <div>
            <div className="stat-value" style={{ color:'#f87171' }}>
              {sorted.filter(s=>{ const d=daysUntil(s.nextRenewal||computeNextRenewal(s.startDate,s.cycle||'Mensuel')); return d>=0&&d<=7; }).length}
            </div>
            <div className="stat-label">Paiements dans 7 jours</div>
          </div>
        </div>
      </div>

      <div style={{ display:'flex', justifyContent:'flex-end', marginBottom:16 }}>
        <button className="btn-gold" onClick={openAdd}>+ Ajouter un abonnement</button>
      </div>

      {showForm && (
        <div className="card" style={{ padding:20, marginBottom:20, border:'1px solid rgba(245,197,24,.3)' }}>
          <h3 style={{ fontSize:15, marginBottom:14 }}>
            {editingId ? '✏️ Modifier l\'abonnement' : 'Nouvel abonnement'}
          </h3>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:11 }} className="grid-2">
            <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})}
              placeholder="Nom de l'abonnement *" autoFocus />
            <input type="number" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})}
              placeholder="Montant (FCFA) *" />
            <div>
              <p style={{ fontSize:11, color:'var(--muted)', marginBottom:5 }}>Date du 1er paiement</p>
              <input type="date" value={form.startDate} onChange={e=>setForm({...form,startDate:e.target.value})} />
            </div>
            <div>
              <p style={{ fontSize:11, color:'var(--muted)', marginBottom:5 }}>Cycle de facturation</p>
              <select value={form.cycle} onChange={e=>setForm({...form,cycle:e.target.value})}>
                <option value="Hebdomadaire">Hebdomadaire</option>
                <option value="Mensuel">Mensuel</option>
                <option value="Trimestriel">Trimestriel</option>
                <option value="Annuel">Annuel</option>
              </select>
            </div>
            <select value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>
              <option>Business</option><option>Loisirs</option><option>École</option><option>Autre</option>
            </select>
            {/* Preview */}
            {form.startDate && (
              <div style={{ background:'rgba(245,197,24,.07)', border:'1px solid rgba(245,197,24,.2)',
                borderRadius:8, padding:'8px 12px', fontSize:12, color:'#fde68a', display:'flex', alignItems:'center', gap:6 }}>
                📅 Prochain paiement : <strong>{fmtDate(computeNextRenewal(form.startDate, form.cycle))}</strong>
              </div>
            )}
          </div>
          <div style={{ display:'flex', gap:8, marginTop:14 }}>
            <button className="btn-gold" onClick={save}>{editingId ? 'Enregistrer' : 'Ajouter'}</button>
            <button className="btn-ghost" onClick={closeForm}>Annuler</button>
          </div>
        </div>
      )}

      {sorted.length===0 ? (
        <EmptyState icon="📋" msg="Aucun abonnement enregistré." sub="Suivez vos abonnements pour ne jamais être surpris." />
      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {sorted.map(sub=>{
            const nextR = sub.nextRenewal || computeNextRenewal(sub.startDate||todayISO(), sub.cycle||'Mensuel');
            const due = daysUntil(nextR);
            const isUrgent  = due >= 0 && due <= 7;
            const isToday   = due === 0;
            const isTomorrow= due === 1;
            const cycleColor = CYCLE_COLORS[sub.cycle||'Mensuel'] || '#9ca3af';
            const monthEq = monthlyEquiv(sub.amount, sub.cycle||'Mensuel');
            const isEditing = editingId===sub.id;

            return (
              <div key={sub.id} className="card" style={{ padding:'16px 18px',
                borderLeft:`3px solid ${isUrgent?'#f87171':isEditing?'#F5C518':'var(--border)'}`,
                background: isEditing ? 'rgba(245,197,24,.03)' : undefined }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:12 }}>
                  <div style={{ flex:1 }}>
                    {/* Name + badges */}
                    <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap', marginBottom:6 }}>
                      <span style={{ fontWeight:700, fontSize:15 }}>{sub.name}</span>
                      <span className="badge" style={{ background:`${cycleColor}20`, color:cycleColor }}>
                        {sub.cycle||'Mensuel'}
                      </span>
                      <span className="badge badge-gray">{sub.category}</span>
                      {isUrgent && (
                        <span className="badge badge-red">
                          {isToday ? '⚠️ Aujourd\'hui !' : isTomorrow ? '⚠️ Demain !' : `🔔 Dans ${due}j`}
                        </span>
                      )}
                      {sub.lastPaid && (
                        <span className="badge badge-green">✓ Payé le {fmtDate(sub.lastPaid)}</span>
                      )}
                    </div>

                    {/* Dates info */}
                    <div style={{ display:'flex', gap:16, flexWrap:'wrap' }}>
                      <p style={{ margin:0, fontSize:12, color: isUrgent?'#fca5a5':'var(--muted)' }}>
                        📅 Prochain paiement : <strong style={{ color: isUrgent?'#f87171':'var(--text)' }}>{fmtDate(nextR)}</strong>
                        {due >= 0 && <span style={{ marginLeft:6, color:isUrgent?'#f87171':'var(--muted)' }}>
                          (J-{due})
                        </span>}
                      </p>
                      {sub.startDate && (
                        <p style={{ margin:0, fontSize:12, color:'var(--muted)' }}>
                          🗓 Depuis le {fmtDate(sub.startDate)}
                        </p>
                      )}
                    </div>

                    {/* Monthly equiv if not monthly */}
                    {sub.cycle!=='Mensuel' && (
                      <p style={{ margin:'5px 0 0', fontSize:11, color:'var(--muted)' }}>
                        ≈ {Math.round(monthEq).toLocaleString('fr-FR')} FCFA/mois
                      </p>
                    )}
                  </div>

                  {/* Right side */}
                  <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', gap:8, flexShrink:0 }}>
                    <span style={{ fontWeight:700, fontSize:17, color:'#F5C518', whiteSpace:'nowrap' }}>
                      {sub.amount.toLocaleString('fr-FR')} FCFA
                    </span>
                    <div style={{ display:'flex', gap:6 }}>
                      <button className="btn-gold" style={{ fontSize:11, padding:'5px 11px' }} onClick={()=>markPaid(sub)}
                        title="Marquer comme payé et avancer au prochain cycle">
                        ✅ Payé
                      </button>
                      <button className="btn-icon" title="Modifier" onClick={()=>openEdit(sub)}
                        style={{ color: isEditing?'#F5C518':undefined }}>✏️</button>
                      <button className="btn-icon" title="Supprimer" onClick={()=>setSubscriptions(p=>p.filter(x=>x.id!==sub.id))}>✕</button>
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* =========================================================
   6. AJUSTEMENTS TAB

function AjustementsTab({ adjustments, setAdjustments, tasks, setTasks }) {
  const upd = (id, field, val) => setAdjustments(p=>p.map(a=>a.id===id?{...a,[field]:val}:a));

  const reschedule = adj => {
    if (!adj.newDate) return;
    const t = {
      ...(adj.originalTask||{}),
      id: adj.taskId || genId(),
      name: adj.taskName,
      deadline: adj.newDate,
      status: 'À faire',
      createdAt: todayISO(),
    };
    setTasks(p => [...p, t]);
    setAdjustments(p => p.filter(a=>a.id!==adj.id));
  };

  const REASON_LABELS = { 'manque de temps':'Manque de temps', 'fatigue':'Fatigue', 'autre':'Autre raison' };
  const REASON_COLORS = { 'manque de temps':'#f87171', 'fatigue':'#fb923c', 'autre':'#60a5fa' };

  return (
    <div>
      <PageHeader
        title="🔄 Ajustements"
        sub={`${adjustments.length} tâche${adjustments.length!==1?'s':''} en attente de reprogrammation`}
      />

      {adjustments.length===0 ? (
        <div style={{ textAlign:'center', padding:'80px 20px' }}>
          <div style={{ fontSize:72, marginBottom:16 }}>🏆</div>
          <h2 style={{ fontFamily:'Syne', color:'#4ade80', fontSize:22, marginBottom:8 }}>Aucun ajustement nécessaire !</h2>
          <p style={{ color:'var(--muted)', fontSize:15 }}>Vous êtes à jour sur toutes vos tâches. Continuez comme ça !</p>
        </div>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
          {adjustments.map(adj=>(
            <div key={adj.id} className="card" style={{ padding:20, borderLeft:'3px solid #f87171' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:14, gap:12 }}>
                <div>
                  <h3 style={{ fontSize:17, margin:'0 0 5px' }}>{adj.taskName}</h3>
                  {adj.originalDeadline && (
                    <p style={{ margin:0, color:'#f87171', fontSize:13 }}>
                      ⏰ Échéance originale : {fmtDate(adj.originalDeadline)}
                    </p>
                  )}
                </div>
                <button className="btn-danger" style={{ flexShrink:0 }}
                  onClick={()=>setAdjustments(p=>p.filter(a=>a.id!==adj.id))}>
                  Supprimer
                </button>
              </div>

              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:14, alignItems:'flex-end' }} className="grid-3">
                <div>
                  <p style={{ fontSize:10, color:'var(--muted)', textTransform:'uppercase', letterSpacing:.8, marginBottom:6 }}>Raison</p>
                  <select value={adj.reason} style={{ fontSize:13 }} onChange={e=>upd(adj.id,'reason',e.target.value)}>
                    <option value="manque de temps">Manque de temps</option>
                    <option value="fatigue">Fatigue</option>
                    <option value="autre">Autre raison</option>
                  </select>
                </div>
                <div>
                  <p style={{ fontSize:10, color:'var(--muted)', textTransform:'uppercase', letterSpacing:.8, marginBottom:6 }}>Nouvelle date</p>
                  <input type="date" value={adj.newDate} style={{ fontSize:13 }}
                    min={todayISO()} onChange={e=>upd(adj.id,'newDate',e.target.value)} />
                </div>
                <button className="btn-gold" style={{ opacity:adj.newDate?1:.4, fontSize:13 }}
                  onClick={()=>reschedule(adj)} disabled={!adj.newDate}>
                  ↩ Reprogrammer
                </button>
              </div>

              <div style={{ marginTop:12 }}>
                <span className="badge" style={{
                  background:`${REASON_COLORS[adj.reason]||'#9ca3af'}22`,
                  color: REASON_COLORS[adj.reason]||'#9ca3af',
                  fontSize:12,
                }}>
                  {REASON_LABELS[adj.reason]||adj.reason}
                </span>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* =========================================================
   SHARED COMPONENTS
   ========================================================= */
function PageHeader({ title, sub, action }) {
  return (
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:24, flexWrap:'wrap', gap:12 }}>
      <div>
        <h1 style={{ fontSize:26, fontWeight:800, margin:0 }}>{title}</h1>
        {sub && <p style={{ color:'var(--muted)', fontSize:14, margin:'4px 0 0' }}>{sub}</p>}
      </div>
      {action}
    </div>
  );
}

function EmptyState({ icon, msg, sub }) {
  return (
    <div style={{ textAlign:'center', padding:'40px 20px', color:'var(--muted)' }}>
      <div style={{ fontSize:42, marginBottom:10 }}>{icon}</div>
      <p style={{ fontSize:15, margin:0, color:'#9ca3af' }}>{msg}</p>
      {sub && <p style={{ fontSize:13, margin:'6px 0 0' }}>{sub}</p>}
    </div>
  );
}

/* =========================================================
   BOOTSTRAP
   ========================================================= */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

/* ---- Enregistrement du Service Worker ---- */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('[PWA] Service Worker enregistré :', reg.scope))
      .catch(err => console.warn('[PWA] Échec enregistrement SW :', err));
  });
}
</script>
</body>
</html>
