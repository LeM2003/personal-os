<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal OS — Dashboard</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0A0E1A" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Personal OS" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0A0E1A;
      --card: #111827;
      --card2: #0f172a;
      --border: #1f2937;
      --gold: #F5C518;
      --gold-dim: rgba(245,197,24,0.12);
      --text: #f0f4f8;
      --muted: #6b7280;
      --sidebar-w: 230px;
    }
    html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    h1,h2,h3,h4,h5 { font-family: 'Syne', sans-serif; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--card); }
    ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

    /* ---- inputs ---- */
    input, select, textarea {
      background: #0f172a;
      border: 1px solid #2d3748;
      color: var(--text);
      border-radius: 8px;
      padding: 9px 12px;
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(245,197,24,0.1);
    }
    input::placeholder, textarea::placeholder { color: #4b5563; }
    select option { background: #0f172a; }
    textarea { resize: vertical; }

    /* ---- buttons ---- */
    .btn-gold {
      background: linear-gradient(135deg, #F5C518 0%, #d4a500 100%);
      color: #0A0E1A;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      cursor: pointer;
      font-size: 14px;
      transition: filter .2s, transform .15s;
      white-space: nowrap;
    }
    .btn-gold:hover { filter: brightness(1.12); transform: translateY(-1px); }
    .btn-gold:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .btn-ghost {
      background: transparent;
      border: 1px solid #2d3748;
      color: #9ca3af;
      font-family: 'DM Sans', sans-serif;
      border-radius: 8px;
      padding: 9px 18px;
      cursor: pointer;
      font-size: 14px;
      transition: border-color .2s, color .2s;
      white-space: nowrap;
    }
    .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
    .btn-danger {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.25);
      color: #f87171;
      font-family: 'DM Sans', sans-serif;
      border-radius: 8px;
      padding: 7px 14px;
      cursor: pointer;
      font-size: 13px;
      transition: background .2s;
    }
    .btn-danger:hover { background: rgba(239,68,68,.2); }
    .btn-icon {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      border-radius: 6px;
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: color .2s, background .2s;
      flex-shrink: 0;
    }
    .btn-icon:hover { color: var(--text); background: #1f2937; }

    /* ---- cards ---- */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
    .card-gold { border-color: rgba(245,197,24,.25); }

    /* ---- sidebar ---- */
    .sidebar {
      width: var(--sidebar-w);
      background: #0c1120;
      border-right: 1px solid var(--border);
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px 10px;
      z-index: 200;
      overflow-y: auto;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      transition: all .2s;
      border-left: 3px solid transparent;
      user-select: none;
    }
    .nav-item:hover { background: var(--gold-dim); color: var(--text); }
    .nav-item.active { background: var(--gold-dim); color: var(--gold); border-left-color: var(--gold); }
    .nav-icon { font-size: 18px; flex-shrink: 0; width: 22px; text-align: center; }

    /* ---- main ---- */
    .main-content {
      margin-left: var(--sidebar-w);
      min-height: 100vh;
      padding: 28px 32px 48px;
      max-width: 1400px;
    }

    /* ---- page transition ---- */
    .page-enter { animation: pageIn .25s ease both; }
    @keyframes pageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ---- badges ---- */
    .badge { display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 999px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .badge-red { background: rgba(239,68,68,.15); color: #f87171; }
    .badge-yellow { background: rgba(245,197,24,.15); color: #F5C518; }
    .badge-green { background: rgba(34,197,94,.15); color: #4ade80; }
    .badge-blue { background: rgba(59,130,246,.15); color: #60a5fa; }
    .badge-purple { background: rgba(139,92,246,.15); color: #a78bfa; }
    .badge-gray { background: rgba(107,114,128,.15); color: #9ca3af; }
    .badge-orange { background: rgba(251,146,60,.15); color: #fb923c; }

    /* ---- progress bar ---- */
    .progress-track { background: #1f2937; border-radius: 999px; height: 6px; overflow: hidden; }
    .progress-fill { height: 6px; border-radius: 999px; background: linear-gradient(90deg, #F5C518, #d4a500); transition: width .4s ease; }
    .progress-fill.green { background: linear-gradient(90deg, #4ade80, #22c55e); }

    /* ---- subtab pills ---- */
    .subtab-bar {
      display: flex;
      gap: 4px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
    }
    .subtab {
      padding: 7px 16px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      transition: all .2s;
      background: transparent;
      color: var(--muted);
    }
    .subtab.active { background: var(--gold); color: #0A0E1A; font-weight: 700; }

    /* ---- filter pills ---- */
    .filter-pill {
      padding: 5px 13px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      transition: all .2s;
      background: #1a2235;
      color: var(--muted);
    }
    .filter-pill.active { background: var(--gold); color: #0A0E1A; font-weight: 700; }

    /* ---- alert boxes ---- */
    .alert { padding: 10px 14px; border-radius: 9px; font-size: 13px; display: flex; gap: 8px; align-items: flex-start; }
    .alert-red { background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2); color: #fca5a5; }
    .alert-yellow { background: rgba(245,197,24,.08); border: 1px solid rgba(245,197,24,.2); color: #fde68a; }
    .alert-blue { background: rgba(59,130,246,.08); border: 1px solid rgba(59,130,246,.2); color: #93c5fd; }

    /* ---- stat card ---- */
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .stat-icon { font-size: 26px; flex-shrink: 0; }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; line-height: 1; }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 3px; }

    /* ---- task card ---- */
    .task-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 15px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color .2s;
    }
    .task-card:hover { border-color: #374151; }
    .task-card.done { opacity: .55; border-left-color: #4ade80; }

    /* ---- status cycle btn ---- */
    .status-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform .15s;
    }
    .status-btn:hover { transform: scale(1.12); }

    /* ---- calendar day ---- */
    .cal-day-header {
      text-align: center;
      padding: 8px 4px 10px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 8px;
    }
    .cal-day-header.today { border-bottom-color: var(--gold); }

    /* ---- modal overlay ---- */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 16px;
      backdrop-filter: blur(4px);
    }
    .modal-box { background: #131b2e; border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 100%; max-width: 440px; }

    /* ---- bottom nav mobile ---- */
    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #0c1120;
      border-top: 1px solid var(--border);
      z-index: 200;
      padding: 6px 0 8px;
    }

    /* ---- AI result block ---- */
    .ai-block {
      background: rgba(245,197,24,.05);
      border: 1px solid rgba(245,197,24,.2);
      border-radius: 10px;
      padding: 16px;
      margin-top: 14px;
    }

    /* ---- divider ---- */
    .divider { height: 1px; background: var(--border); margin: 16px 0; }

    /* ---- priority dot ---- */
    .p-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    /* ---- loading spinner ---- */
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(0,0,0,.2); border-top-color: #0A0E1A; border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 900px) {
      .main-content { margin-left: 0; padding: 16px 14px 80px; }
      .sidebar { display: none; }
      .bottom-nav { display: flex; justify-content: space-around; align-items: center; }
      .main-content { padding-bottom: 80px; }
    }
    @media (max-width: 640px) {
      .grid-2 { grid-template-columns: 1fr !important; }
      .grid-3 { grid-template-columns: 1fr !important; }
      .grid-6 { grid-template-columns: repeat(3, 1fr) !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

/* =========================================================
   UTILITIES
   ========================================================= */
const genId = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36);

const todayISO = () => new Date().toISOString().split('T')[0];

const fmtDate = (iso) => {
  if (!iso) return '—';
  const d = new Date(iso + 'T00:00:00');
  if (isNaN(d)) return iso;
  return d.toLocaleDateString('fr-FR');
};

const daysUntil = (iso) => {
  if (!iso) return Infinity;
  const d = new Date(iso + 'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.ceil((d - now) / 86400000);
};

const todayLabel = () =>
  new Date().toLocaleDateString('fr-FR', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

const greeting = () => {
  const h = new Date().getHours();
  if (h < 5)  return 'Bonne nuit';
  if (h < 12) return 'Bonjour';
  if (h < 18) return 'Bon après-midi';
  return 'Bonsoir';
};

const JOURS_FR = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const todayDay = () => JOURS_FR[new Date().getDay()];

const PRIORITY_ORDER = { Critique: 0, Important: 1, Optionnel: 2 };
const PRIORITY_COLOR = { Critique: '#f87171', Important: '#F5C518', Optionnel: '#9ca3af' };
const PRIORITY_EMOJI = { Critique: '🔴', Important: '🟡', Optionnel: '⚪' };

const CAT_COLORS = {
  Nourriture: '#f59e0b', Transport: '#3b82f6', Business: '#F5C518',
  École: '#8b5cf6', Loisirs: '#ec4899', Autre: '#6b7280',
};

const COURSE_PALETTE = ['#6366f1','#ec4899','#14b8a6','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ef4444','#06b6d4'];

/* =========================================================
   LOCAL STORAGE HOOK
   ========================================================= */
function useLS(key, def) {
  const [val, setVal] = useState(() => {
    try {
      const s = localStorage.getItem(key);
      return s !== null ? JSON.parse(s) : def;
    } catch { return def; }
  });
  const set = useCallback((v) => {
    setVal(prev => {
      const next = typeof v === 'function' ? v(prev) : v;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [key]);
  return [val, set];
}

/* =========================================================
   SAMPLE DATA  (used only when localStorage is empty)
   ========================================================= */
const SAMPLE_TASKS = [
  { id: genId(), name: 'Créer 3 vidéos TikTok éducatives', project: 'Chaîne TikTok', priority: 'Critique',
    duration: 120, deadline: (() => { const d=new Date(); d.setDate(d.getDate()+2); return d.toISOString().split('T')[0]; })(),
    flexible: false, status: 'En cours', createdAt: todayISO() },
  { id: genId(), name: 'Réviser Bases de données — Chap. 3', project: 'École', priority: 'Important',
    duration: 90, deadline: (() => { const d=new Date(); d.setDate(d.getDate()+4); return d.toISOString().split('T')[0]; })(),
    flexible: true, status: 'À faire', createdAt: todayISO() },
];

const SAMPLE_PROJECTS = [
  { id: genId(), name: 'Chaîne TikTok Éducation Business', objective: 'Atteindre 10 000 abonnés avec du contenu business & entrepreneuriat africain',
    targetDate: (() => { const d=new Date(); d.setDate(d.getDate()+90); return d.toISOString().split('T')[0]; })(),
    aiAnalysis: null, createdAt: todayISO() },
];

const SAMPLE_COURSES = [
  { id: genId(), nom: 'Bases de données', jour: 'Lundi',    heureDebut: '08:00', heureFin: '10:00', salle: 'Salle 203', professeur: 'M. Diallo',  color: '#6366f1' },
  { id: genId(), nom: 'Algorithmes',      jour: 'Mardi',    heureDebut: '10:00', heureFin: '12:00', salle: 'Labo Info', professeur: 'Mme. Ndiaye', color: '#ec4899' },
  { id: genId(), nom: 'Réseaux',          jour: 'Mercredi', heureDebut: '14:00', heureFin: '16:00', salle: 'Salle 105', professeur: 'M. Sow',      color: '#14b8a6' },
  { id: genId(), nom: 'Maths Discrètes',  jour: 'Jeudi',    heureDebut: '08:00', heureFin: '10:00', salle: 'Amphi A',   professeur: 'M. Ba',        color: '#f59e0b' },
];

const SAMPLE_DEVOIRS = [
  { id: genId(), matiere: 'Bases de données', description: 'TP Modélisation UML — Système de bibliothèque',
    dateRendu: (() => { const d=new Date(); d.setDate(d.getDate()+3); return d.toISOString().split('T')[0]; })(),
    statut: 'À faire', priorite: 'Important' },
];

const SAMPLE_EXAMENS = [
  { id: genId(), matiere: 'Algorithmes',
    date: (() => { const d=new Date(); d.setDate(d.getDate()+14); return d.toISOString().split('T')[0]; })(),
    heure: '08:00', salle: 'Grand Amphi', chapitres: 'Tri, Graphes, Arbres binaires', totalChapitres: 3, chapitresRevises: 1 },
];

const SAMPLE_EXPENSES = [
  { id: genId(), amount: 2500, category: 'Nourriture', date: todayISO(), type: 'Variable', note: 'Déjeuner café numérique' },
  { id: genId(), amount: 500,  category: 'Transport',  date: todayISO(), type: 'Variable', note: 'Bus université' },
];

const SAMPLE_SUBS = [
  { id: genId(), name: 'Claude Pro', amount: 13000, startDate: '2025-03-23', cycle: 'Mensuel',  category: 'Business',
    nextRenewal: (() => { const d=new Date(); d.setDate(d.getDate()+5);  return d.toISOString().split('T')[0]; })() },
  { id: genId(), name: 'Canva Pro',  amount:  6000, startDate: '2025-03-08', cycle: 'Mensuel',  category: 'Business',
    nextRenewal: (() => { const d=new Date(); d.setDate(d.getDate()+20); return d.toISOString().split('T')[0]; })() },
];

/* =========================================================
   SUBSCRIPTION UTILITIES
   ========================================================= */
const CYCLE_LABELS = { Mensuel:'Mensuel', Trimestriel:'Trimestriel', Annuel:'Annuel', Hebdomadaire:'Hebdomadaire' };

const advanceCycle = (dateISO, cycle) => {
  const d = new Date(dateISO + 'T00:00:00');
  if (cycle === 'Mensuel')      d.setMonth(d.getMonth() + 1);
  else if (cycle === 'Trimestriel') d.setMonth(d.getMonth() + 3);
  else if (cycle === 'Annuel')  d.setFullYear(d.getFullYear() + 1);
  else if (cycle === 'Hebdomadaire') d.setDate(d.getDate() + 7);
  return d.toISOString().split('T')[0];
};

/* Compute next renewal from startDate + cycle (first date strictly after today) */
const computeNextRenewal = (startDate, cycle) => {
  if (!startDate) return '';
  let cur = startDate;
  const now = todayISO();
  // advance until we are strictly after today
  let safety = 0;
  while (cur <= now && safety < 200) { cur = advanceCycle(cur, cycle); safety++; }
  return cur;
};

/* Normalize any amount to its monthly equivalent for the total */
const monthlyEquiv = (amount, cycle) => {
  if (cycle === 'Annuel')      return amount / 12;
  if (cycle === 'Trimestriel') return amount / 3;
  if (cycle === 'Hebdomadaire')return amount * 4.33;
  return amount; // Mensuel
};

/* =========================================================
   ROOT APP
   ========================================================= */
function App() {
  const [tab, setTab] = useState('dashboard');
  const [apiKey, setApiKey] = useLS('pos_apikey', '');
  const [apiModal, setApiModal] = useState(false);

  const [tasks,         setTasks]         = useLS('pos_tasks',         SAMPLE_TASKS);
  const [projects,      setProjects]      = useLS('pos_projects',      SAMPLE_PROJECTS);
  const [expenses,      setExpenses]      = useLS('pos_expenses',      SAMPLE_EXPENSES);
  const [subscriptions, setSubscriptions] = useLS('pos_subscriptions', SAMPLE_SUBS);
  const [objectif,      setObjectif]      = useLS('pos_objectif',      'Lancer ma chaîne TikTok et valider mon semestre avec mention');
  const [adjustments,   setAdjustments]   = useLS('pos_adjustments',   []);
  const [courses,       setCourses]       = useLS('pos_courses',       SAMPLE_COURSES);
  const [devoirs,       setDevoirs]       = useLS('pos_devoirs',       SAMPLE_DEVOIRS);
  const [examens,       setExamens]       = useLS('pos_examens',       SAMPLE_EXAMENS);

  /* Auto-move overdue tasks → Ajustements */
  useEffect(() => {
    const now = todayISO();
    const overdue = tasks.filter(t => t.deadline && t.deadline < now && t.status !== 'Terminé');
    if (!overdue.length) return;
    const ids = new Set(overdue.map(t => t.id));
    setTasks(prev => prev.filter(t => !ids.has(t.id)));
    setAdjustments(prev => {
      const existIds = new Set(prev.map(a => a.taskId));
      const news = overdue.filter(t => !existIds.has(t.id)).map(t => ({
        id: genId(), taskId: t.id, taskName: t.name,
        originalDeadline: t.deadline, reason: 'manque de temps',
        newDate: '', originalTask: { ...t },
      }));
      return [...prev, ...news];
    });
  }, []); // eslint-disable-line

  const shared = {
    tasks, setTasks, projects, setProjects, expenses, setExpenses,
    subscriptions, setSubscriptions, objectif, setObjectif,
    adjustments, setAdjustments, courses, setCourses,
    devoirs, setDevoirs, examens, setExamens,
    apiKey, setTab,
  };

  const TABS = [
    { id:'dashboard',   icon:'🏠', label:'Dashboard'      },
    { id:'taches',      icon:'✅', label:'Tâches'          },
    { id:'projets',     icon:'🎯', label:'Projets & Idées' },
    { id:'ecole',       icon:'📚', label:'École'           },
    { id:'finances',    icon:'💰', label:'Finances'        },
    { id:'ajustements', icon:'🔄', label:'Ajustements'     },
  ];

  const adjBadge = adjustments.length > 0 && (
    <span style={{ background:'#f87171', color:'#fff', borderRadius:'50%', width:18, height:18,
      display:'inline-flex', alignItems:'center', justifyContent:'center', fontSize:10, fontWeight:700, marginLeft:'auto' }}>
      {adjustments.length}
    </span>
  );

  return (
    <div>
      {/* ---- SIDEBAR ---- */}
      <aside className="sidebar">
        <div style={{ paddingLeft:8, marginBottom:28 }}>
          <h1 style={{ fontSize:20, fontWeight:800, color:'#F5C518', letterSpacing:'-0.5px' }}>Personal OS</h1>
          <p style={{ color:'var(--muted)', fontSize:11, marginTop:3 }}>Dashboard Pro · Dakar</p>
        </div>

        <nav style={{ flex:1, display:'flex', flexDirection:'column', gap:3 }}>
          {TABS.map(t => (
            <div key={t.id}
              className={`nav-item${tab===t.id?' active':''}`}
              onClick={() => setTab(t.id)}>
              <span className="nav-icon">{t.icon}</span>
              <span style={{ flex:1 }}>{t.label}</span>
              {t.id==='ajustements' && adjustments.length>0 && adjBadge}
            </div>
          ))}
        </nav>

        <div style={{ borderTop:'1px solid var(--border)', paddingTop:16, marginTop:12 }}>
          <button className="btn-ghost" style={{ width:'100%', fontSize:12, padding:'8px 12px' }} onClick={() => setApiModal(true)}>
            🔑 Clé API Anthropic
          </button>
        </div>
      </aside>

      {/* ---- MAIN CONTENT ---- */}
      <main className="main-content">
        <div className="page-enter" key={tab}>
          {tab==='dashboard'   && <DashboardTab   {...shared} />}
          {tab==='taches'      && <TachesTab      {...shared} />}
          {tab==='projets'     && <ProjetsTab      tasks={tasks} projects={projects} setProjects={setProjects} apiKey={apiKey} />}
          {tab==='ecole'       && <EcoleTab        courses={courses} setCourses={setCourses} devoirs={devoirs} setDevoirs={setDevoirs} examens={examens} setExamens={setExamens} />}
          {tab==='finances'    && <FinancesTab     expenses={expenses} setExpenses={setExpenses} subscriptions={subscriptions} setSubscriptions={setSubscriptions} />}
          {tab==='ajustements' && <AjustementsTab  adjustments={adjustments} setAdjustments={setAdjustments} tasks={tasks} setTasks={setTasks} />}
        </div>
      </main>

      {/* ---- BOTTOM NAV (mobile) ---- */}
      <nav className="bottom-nav">
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            style={{ background:'none', border:'none', cursor:'pointer', display:'flex', flexDirection:'column',
              alignItems:'center', gap:2, padding:'4px 8px',
              color: tab===t.id ? '#F5C518' : 'var(--muted)', position:'relative' }}>
            <span style={{ fontSize:20 }}>{t.icon}</span>
            <span style={{ fontSize:9, fontFamily:'DM Sans', fontWeight:500 }}>{t.label.split(' ')[0]}</span>
            {t.id==='ajustements' && adjustments.length>0 && (
              <span style={{ position:'absolute', top:0, right:0, background:'#f87171', color:'#fff',
                borderRadius:'50%', width:14, height:14, fontSize:9, display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700 }}>
                {adjustments.length}
              </span>
            )}
          </button>
        ))}
      </nav>

      {/* ---- API KEY MODAL ---- */}
      {apiModal && (
        <div className="modal-overlay" onClick={() => setApiModal(false)}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            <h3 style={{ fontSize:18, marginBottom:8, color:'#F5C518' }}>🔑 Clé API Anthropic</h3>
            <p style={{ color:'var(--muted)', fontSize:14, marginBottom:16, lineHeight:1.6 }}>
              Votre clé API est stockée uniquement dans votre navigateur (localStorage).<br />
              Obtenez-la sur <strong style={{color:'var(--text)'}}>console.anthropic.com</strong>
            </p>
            <input
              type="password"
              value={apiKey}
              onChange={e => setApiKey(e.target.value)}
              placeholder="sk-ant-api03-..."
              style={{ marginBottom:16 }}
            />
            <div style={{ display:'flex', gap:8 }}>
              <button className="btn-gold" onClick={() => setApiModal(false)}>Enregistrer</button>
              <button className="btn-ghost" onClick={() => setApiModal(false)}>Fermer</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* =========================================================
   1. DASHBOARD TAB
   ========================================================= */
function DashboardTab({ tasks, objectif, setObjectif, expenses, subscriptions, devoirs, examens, adjustments, courses, setTab }) {
  const now = todayISO();
  const dayName = todayDay();

  /* stats */
  const createdToday  = tasks.filter(t => t.createdAt === now);
  const completedToday = createdToday.filter(t => t.status === 'Terminé').length;
  const todayExpTotal = expenses.filter(e => e.date === now).reduce((s,e) => s+e.amount, 0);
  const upcomingExams = examens.filter(e => { const d=daysUntil(e.date); return d>=0&&d<=14; }).length;

  /* top 3 priority tasks */
  const top3 = [...tasks]
    .filter(t => t.status !== 'Terminé')
    .sort((a,b) => PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority])
    .slice(0,3);

  /* today's courses */
  const todayCourses = courses.filter(c => c.jour === dayName)
    .sort((a,b) => a.heureDebut.localeCompare(b.heureDebut));

  /* today's expenses detail */
  const todayExpenses = expenses.filter(e => e.date === now)
    .sort((a,b) => b.amount - a.amount);

  /* upcoming subscriptions (next 30 days) */
  const upcomingSubs = subscriptions
    .map(s => ({ ...s, _next: s.nextRenewal || computeNextRenewal(s.startDate||now, s.cycle||'Mensuel') }))
    .filter(s => { const d=daysUntil(s._next); return d>=0&&d<=30; })
    .sort((a,b) => new Date(a._next)-new Date(b._next));

  /* alerts — use nextRenewal (new field) */
  const alerts = [];
  examens.filter(e => { const d=daysUntil(e.date); return d>=0&&d<=7; })
    .forEach(e => alerts.push({ type:'red', msg:`🎓 Examen J-${daysUntil(e.date)} : ${e.matiere} — ${fmtDate(e.date)}` }));
  devoirs.filter(d => d.statut!=='Rendu' && daysUntil(d.dateRendu)>=0 && daysUntil(d.dateRendu)<=2)
    .forEach(d => alerts.push({ type:'red', msg:`📋 Devoir urgent J-${daysUntil(d.dateRendu)} : ${d.matiere}` }));
  upcomingSubs.filter(s=>daysUntil(s._next)<=7)
    .forEach(s => alerts.push({ type:'yellow', msg:`💳 ${s.name} — paiement dans ${daysUntil(s._next)}j (${s.amount.toLocaleString('fr-FR')} FCFA)` }));
  devoirs.filter(d => d.statut!=='Rendu' && daysUntil(d.dateRendu)<0)
    .forEach(d => alerts.push({ type:'red', msg:`⚠️ Devoir en retard : ${d.matiere}` }));
  if (adjustments.length>0)
    alerts.push({ type:'blue', msg:`🔄 ${adjustments.length} tâche${adjustments.length>1?'s':''} en attente de reprogrammation` });

  return (
    <div>
      {/* Header */}
      <div style={{ marginBottom:28 }}>
        <p style={{ color:'var(--muted)', fontSize:13, textTransform:'capitalize', marginBottom:6 }}>{todayLabel()}</p>
        <h1 style={{ fontSize:30, fontWeight:800, lineHeight:1.2 }}>
          {greeting()}, <span style={{ color:'#F5C518' }}>Mouhamadou</span> 👋
        </h1>
      </div>

      {/* Objectif */}
      <div className="card card-gold" style={{ padding:'16px 20px', marginBottom:24 }}>
        <p style={{ color:'#F5C518', fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:1, marginBottom:8 }}>
          🎯 Objectif principal du moment
        </p>
        <input
          value={objectif}
          onChange={e => setObjectif(e.target.value)}
          style={{ background:'transparent', border:'none', color:'var(--text)', fontSize:16,
            fontWeight:500, fontFamily:'Syne', padding:0, boxShadow:'none' }}
          placeholder="Définissez votre objectif principal…"
        />
      </div>

      {/* Stats row */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))', gap:14, marginBottom:24 }}>
        <StatCard icon="✅" value={`${completedToday}/${createdToday.length||0}`} label="Tâches aujourd'hui" color="#4ade80" />
        <StatCard icon="💸" value={`${todayExpTotal.toLocaleString('fr-FR')} F`}   label="Dépenses du jour"  color="#60a5fa" />
        <StatCard icon="🎓" value={upcomingExams}                                   label="Examens à venir"   color="#F5C518" />
        <StatCard icon="🔄" value={adjustments.length}                              label="Ajustements"       color="#f87171" onClick={() => setTab('ajustements')} />
      </div>

      {/* Main grid — top 3 + alertes */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20, marginBottom:20 }} className="grid-2">
        {/* Top 3 */}
        <div className="card" style={{ padding:20 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
            <h3 style={{ fontSize:13, fontWeight:700, textTransform:'uppercase', letterSpacing:.8 }}>⚡ Top 3 Priorités</h3>
            <button className="btn-ghost" style={{ fontSize:11, padding:'4px 10px' }} onClick={() => setTab('taches')}>Voir tout →</button>
          </div>
          {top3.length===0 ? (
            <EmptyState icon="🎉" msg="Aucune tâche active. Bien joué !" />
          ) : top3.map(t => (
            <div key={t.id} style={{ display:'flex', alignItems:'center', gap:10, padding:'9px 0', borderBottom:'1px solid var(--border)' }}>
              <div className="p-dot" style={{ background: PRIORITY_COLOR[t.priority] }} />
              <div style={{ flex:1, minWidth:0 }}>
                <p style={{ fontSize:14, margin:0, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{t.name}</p>
                <p style={{ fontSize:11, color:'var(--muted)', margin:'2px 0 0' }}>
                  {t.project && `📁 ${t.project}`}{t.deadline && ` · ${fmtDate(t.deadline)}`}
                </p>
              </div>
              <span className={`badge badge-${t.status==='En cours'?'blue':'gray'}`}>{t.status}</span>
            </div>
          ))}
        </div>

        {/* Alerts */}
        <div className="card" style={{ padding:20 }}>
          <h3 style={{ fontSize:13, fontWeight:700, textTransform:'uppercase', letterSpacing:.8, marginBottom:16 }}>⚠️ Alertes & Rappels</h3>
          {alerts.length===0 ? (
            <EmptyState icon="✨" msg="Tout est sous contrôle !" sub="Aucune alerte pour le moment." />
          ) : (
            <div style={{ display:'flex', flexDirection:'column', gap:7 }}>
              {alerts.slice(0,6).map((a,i) => (
                <div key={i} className={`alert alert-${a.type}`}>{a.msg}</div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* ── RÉSUMÉ DU JOUR ── */}
      <div style={{ marginBottom:8 }}>
        <h2 style={{ fontSize:14, fontWeight:700, textTransform:'uppercase', letterSpacing:1,
          color:'var(--muted)', marginBottom:16, display:'flex', alignItems:'center', gap:8 }}>
          <span style={{ display:'inline-block', width:3, height:14, background:'#F5C518', borderRadius:2 }} />
          Résumé du jour
        </h2>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:20, marginBottom:20 }} className="grid-3">

        {/* Emploi du temps aujourd'hui */}
        <div className="card" style={{ padding:20 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
            <h3 style={{ fontSize:13, fontWeight:700, textTransform:'uppercase', letterSpacing:.8 }}>📅 Agenda — {dayName}</h3>
            <button className="btn-ghost" style={{ fontSize:11, padding:'4px 10px' }} onClick={() => setTab('ecole')}>École →</button>
          </div>
          {todayCourses.length===0 ? (
            <div style={{ textAlign:'center', padding:'16px 0', color:'var(--muted)' }}>
              <div style={{ fontSize:28, marginBottom:6 }}>🎉</div>
              <p style={{ fontSize:13 }}>Pas de cours aujourd'hui</p>
            </div>
          ) : (
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              {todayCourses.map(c => (
                <div key={c.id} style={{ display:'flex', alignItems:'center', gap:10,
                  background:`${c.color}14`, borderLeft:`3px solid ${c.color}`, borderRadius:7, padding:'9px 12px' }}>
                  <div style={{ flex:1, minWidth:0 }}>
                    <p style={{ fontWeight:600, color:c.color, margin:0, fontSize:13,
                      whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{c.nom}</p>
                    <p style={{ fontSize:11, color:'var(--muted)', margin:'2px 0 0' }}>
                      {c.heureDebut} – {c.heureFin}{c.salle ? ` · ${c.salle}` : ''}
                    </p>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Dépenses du jour */}
        <div className="card" style={{ padding:20 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
            <h3 style={{ fontSize:13, fontWeight:700, textTransform:'uppercase', letterSpacing:.8 }}>💸 Dépenses du jour</h3>
            <button className="btn-ghost" style={{ fontSize:11, padding:'4px 10px' }} onClick={() => setTab('finances')}>Finances →</button>
          </div>
          {todayExpenses.length===0 ? (
            <div style={{ textAlign:'center', padding:'16px 0', color:'var(--muted)' }}>
              <div style={{ fontSize:28, marginBottom:6 }}>💰</div>
              <p style={{ fontSize:13 }}>Aucune dépense ce jour</p>
            </div>
          ) : (
            <>
              <div style={{ display:'flex', flexDirection:'column', gap:6, marginBottom:12 }}>
                {todayExpenses.slice(0,5).map(e => (
                  <div key={e.id} style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <div style={{ width:8, height:8, borderRadius:'50%', background:CAT_COLORS[e.category]||'#6b7280', flexShrink:0 }} />
                    <span style={{ flex:1, fontSize:13, color:'#d1d5db', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
                      {e.note||e.category}
                    </span>
                    <span style={{ fontSize:13, fontWeight:600, color:'var(--text)', whiteSpace:'nowrap' }}>
                      {e.amount.toLocaleString('fr-FR')} F
                    </span>
                  </div>
                ))}
                {todayExpenses.length > 5 && (
                  <p style={{ fontSize:11, color:'var(--muted)', textAlign:'center', margin:'4px 0 0' }}>
                    +{todayExpenses.length - 5} autre{todayExpenses.length-5>1?'s':''}…
                  </p>
                )}
              </div>
              <div style={{ borderTop:'1px solid var(--border)', paddingTop:10, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <span style={{ fontSize:12, color:'var(--muted)', fontWeight:600, textTransform:'uppercase', letterSpacing:.5 }}>Total</span>
                <span style={{ fontSize:16, fontWeight:700, color:'#F5C518' }}>{todayExpTotal.toLocaleString('fr-FR')} FCFA</span>
              </div>
            </>
          )}
        </div>

        {/* Abonnements à venir */}
        <div className="card" style={{ padding:20 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
            <h3 style={{ fontSize:13, fontWeight:700, textTransform:'uppercase', letterSpacing:.8 }}>💳 Prochains paiements</h3>
            <button className="btn-ghost" style={{ fontSize:11, padding:'4px 10px' }} onClick={() => setTab('finances')}>Voir →</button>
          </div>
          {upcomingSubs.length===0 ? (
            <div style={{ textAlign:'center', padding:'16px 0', color:'var(--muted)' }}>
              <div style={{ fontSize:28, marginBottom:6 }}>✅</div>
              <p style={{ fontSize:13 }}>Aucun paiement dans 30 jours</p>
            </div>
          ) : (
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              {upcomingSubs.slice(0,5).map(s => {
                const due = daysUntil(s._next);
                const urgent = due <= 7;
                return (
                  <div key={s.id} style={{ display:'flex', alignItems:'center', gap:8,
                    padding:'8px 10px', background: urgent?'rgba(239,68,68,.06)':'#0f172a',
                    border:`1px solid ${urgent?'rgba(239,68,68,.2)':'var(--border)'}`, borderRadius:8 }}>
                    <div style={{ flex:1, minWidth:0 }}>
                      <p style={{ fontSize:13, fontWeight:600, margin:0,
                        whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{s.name}</p>
                      <p style={{ fontSize:11, color: urgent?'#fca5a5':'var(--muted)', margin:'2px 0 0' }}>
                        {due===0 ? "Aujourd'hui" : due===1 ? 'Demain' : `Dans ${due}j`} — {fmtDate(s._next)}
                      </p>
                    </div>
                    <span style={{ fontSize:13, fontWeight:700, color: urgent?'#f87171':'#F5C518', whiteSpace:'nowrap' }}>
                      {s.amount.toLocaleString('fr-FR')} F
                    </span>
                  </div>
                );
              })}
            </div>
          )}
        </div>

      </div>
    </div>
  );
}

function StatCard({ icon, value, label, color, onClick }) {
  return (
    <div className="stat-card" style={{ cursor: onClick ? 'pointer' : 'default' }} onClick={onClick}>
      <span className="stat-icon">{icon}</span>
      <div>
        <div className="stat-value" style={{ color }}>{value}</div>
        <div className="stat-label">{label}</div>
      </div>
    </div>
  );
}

/* =========================================================
   2. TÂCHES TAB
   ========================================================= */
function TachesTab({ tasks, setTasks, adjustments, setAdjustments }) {
  const blank = { name:'', project:'', priority:'Important', duration:30, deadline:'', flexible:false };
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState(blank);
  const [editingId, setEditingId] = useState(null); // null = adding new, string = editing existing
  const [fStatus, setFStatus] = useState('Tous');
  const [fPriority, setFPriority] = useState('Tous');

  const openAdd = () => { setEditingId(null); setForm(blank); setShowForm(true); };
  const openEdit = task => {
    setEditingId(task.id);
    setForm({ name:task.name, project:task.project||'', priority:task.priority,
      duration:task.duration||30, deadline:task.deadline||'', flexible:!!task.flexible });
    setShowForm(true);
    window.scrollTo({ top:0, behavior:'smooth' });
  };
  const closeForm = () => { setShowForm(false); setEditingId(null); setForm(blank); };

  const saveTask = () => {
    if (!form.name.trim()) return;
    if (editingId) {
      setTasks(p => p.map(t => t.id===editingId ? { ...t, ...form } : t));
    } else {
      setTasks(p => [...p, { ...form, id:genId(), status:'À faire', createdAt:todayISO() }]);
    }
    closeForm();
  };

  const cycleStatus = id => setTasks(p => p.map(t => {
    if (t.id!==id) return t;
    const next = { 'À faire':'En cours', 'En cours':'Terminé', 'Terminé':'À faire' };
    return { ...t, status: next[t.status] };
  }));

  const del = id => setTasks(p => p.filter(t => t.id!==id));

  const toAdjust = task => {
    setTasks(p => p.filter(t => t.id!==task.id));
    setAdjustments(p => [...p, { id:genId(), taskId:task.id, taskName:task.name,
      originalDeadline:task.deadline, reason:'autre', newDate:'', originalTask:{...task} }]);
  };

  const filtered = tasks
    .filter(t => fStatus==='Tous' || t.status===fStatus)
    .filter(t => fPriority==='Tous' || t.priority===fPriority);

  const grouped = { Critique:[], Important:[], Optionnel:[] };
  filtered.forEach(t => (grouped[t.priority]||=[]).push(t));

  return (
    <div>
      <PageHeader title="✅ Tâches" action={<button className="btn-gold" onClick={openAdd}>+ Nouvelle tâche</button>} />

      {showForm && (
        <div className="card" style={{ padding:20, marginBottom:20, border:'1px solid rgba(245,197,24,.3)' }}>
          <h3 style={{ fontSize:16, marginBottom:16 }}>
            {editingId ? '✏️ Modifier la tâche' : 'Nouvelle tâche'}
          </h3>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }} className="grid-2">
            <div style={{ gridColumn:'1/-1' }}>
              <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Nom de la tâche *" autoFocus />
            </div>
            <input value={form.project} onChange={e=>setForm({...form,project:e.target.value})} placeholder="Projet lié (optionnel)" />
            <select value={form.priority} onChange={e=>setForm({...form,priority:e.target.value})}>
              <option value="Critique">🔴 Critique</option>
              <option value="Important">🟡 Important</option>
              <option value="Optionnel">⚪ Optionnel</option>
            </select>
            <input type="number" value={form.duration} min={5} step={5}
              onChange={e=>setForm({...form,duration:+e.target.value})} placeholder="Durée estimée (min)" />
            <input type="date" value={form.deadline} onChange={e=>setForm({...form,deadline:e.target.value})} />
            <label style={{ display:'flex', alignItems:'center', gap:8, color:'#9ca3af', fontSize:14, cursor:'pointer',
              background:'#0f172a', border:'1px solid #2d3748', borderRadius:8, padding:'9px 12px' }}>
              <input type="checkbox" checked={form.flexible} onChange={e=>setForm({...form,flexible:e.target.checked})}
                style={{ width:'auto', accentColor:'#F5C518' }} />
              Tâche flexible
            </label>
          </div>
          <div style={{ display:'flex', gap:8, marginTop:16 }}>
            <button className="btn-gold" onClick={saveTask}>{editingId ? 'Enregistrer' : 'Ajouter'}</button>
            <button className="btn-ghost" onClick={closeForm}>Annuler</button>
          </div>
        </div>
      )}

      {/* Filters */}
      <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:20 }}>
        {['Tous','À faire','En cours','Terminé'].map(s=>(
          <button key={s} className={`filter-pill${fStatus===s?' active':''}`} onClick={()=>setFStatus(s)}>{s}</button>
        ))}
        <div style={{ width:1, background:'var(--border)', margin:'0 4px' }} />
        {['Tous','Critique','Important','Optionnel'].map(p=>(
          <button key={p} className={`filter-pill${fPriority===p?' active':''}`} onClick={()=>setFPriority(p)}>
            {PRIORITY_EMOJI[p]||''} {p}
          </button>
        ))}
      </div>

      {/* Grouped task list */}
      {filtered.length===0 ? (
        <EmptyState icon="📝" msg="Aucune tâche ici." sub="Cliquez sur « + Nouvelle tâche » pour commencer." />
      ) : (
        Object.entries(grouped).map(([priority, list]) => list.length===0 ? null : (
          <div key={priority} style={{ marginBottom:24 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:10 }}>
              <span>{PRIORITY_EMOJI[priority]}</span>
              <span style={{ fontFamily:'Syne', fontWeight:700, fontSize:12, color:PRIORITY_COLOR[priority],
                textTransform:'uppercase', letterSpacing:1 }}>{priority}</span>
              <span style={{ background:'#1f2937', color:'var(--muted)', borderRadius:'50%', width:20, height:20,
                display:'inline-flex', alignItems:'center', justifyContent:'center', fontSize:11 }}>{list.length}</span>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              {list.map(t=><TaskRow key={t.id} task={t} cycleStatus={cycleStatus} del={del} toAdjust={toAdjust} onEdit={openEdit} isEditing={editingId===t.id} />)}
            </div>
          </div>
        ))
      )}
    </div>
  );
}

function TaskRow({ task, cycleStatus, del, toAdjust, onEdit, isEditing }) {
  const due = daysUntil(task.deadline);
  const overdue = due < 0;
  const urgent = due >= 0 && due <= 2;
  const statusIcon = { 'À faire':'⭕', 'En cours':'🔵', 'Terminé':'✅' }[task.status];
  const statusBg = { 'À faire':'#1f2937', 'En cours':'rgba(59,130,246,.15)', 'Terminé':'rgba(34,197,94,.15)' }[task.status];
  const statusColor = { 'À faire':'#9ca3af', 'En cours':'#60a5fa', 'Terminé':'#4ade80' }[task.status];

  return (
    <div className={`task-card${task.status==='Terminé'?' done':''}`}
      style={{ borderLeft:`3px solid ${isEditing?'#F5C518':task.status==='Terminé'?'#4ade80':'transparent'}`,
        background: isEditing ? 'rgba(245,197,24,.04)' : undefined }}>
      <button className="status-btn" onClick={()=>cycleStatus(task.id)}
        style={{ background: statusBg, fontSize:16 }} title="Changer statut">
        {statusIcon}
      </button>
      <div style={{ flex:1, minWidth:0 }}>
        <p style={{ fontSize:14, margin:0, textDecoration:task.status==='Terminé'?'line-through':'none',
          color: task.status==='Terminé'?'var(--muted)':'var(--text)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
          {task.name}
        </p>
        <div style={{ display:'flex', gap:10, marginTop:3, flexWrap:'wrap' }}>
          {task.project && <span style={{ fontSize:11, color:'var(--muted)' }}>📁 {task.project}</span>}
          {task.duration && <span style={{ fontSize:11, color:'var(--muted)' }}>⏱ {task.duration}min</span>}
          {task.deadline && <span style={{ fontSize:11, color:overdue?'#f87171':urgent?'#F5C518':'var(--muted)' }}>
            {overdue?'⚠️ Retard:':'📅'} {fmtDate(task.deadline)}
          </span>}
          {task.flexible && <span style={{ fontSize:11, color:'var(--muted)' }}>🔀 Flexible</span>}
        </div>
      </div>
      <div style={{ display:'flex', gap:6, alignItems:'center', flexShrink:0 }}>
        <span style={{ background:statusBg, color:statusColor, padding:'3px 10px', borderRadius:999, fontSize:11, fontWeight:600 }}>
          {task.status}
        </span>
        <button className="btn-icon" title="Modifier" onClick={()=>onEdit(task)} style={{ color: isEditing?'#F5C518':undefined }}>✏️</button>
        <button className="btn-icon" title="Déplacer en ajustements" onClick={()=>toAdjust(task)}>🔄</button>
        <button className="btn-icon" title="Supprimer" onClick={()=>del(task.id)}>✕</button>
      </div>
    </div>
  );
}

/* =========================================================
   3. PROJETS & IDÉES TAB
   ========================================================= */
function ProjetsTab({ tasks, projects, setProjects, apiKey }) {
  const blank = { name:'', objective:'', targetDate:'' };
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState(blank);
  const [analyzing, setAnalyzing] = useState(null);
  const [aiError, setAiError] = useState('');

  const addProject = () => {
    if (!form.name.trim()) return;
    setProjects(p => [...p, { ...form, id:genId(), createdAt:todayISO(), aiAnalysis:null }]);
    setForm(blank); setShowForm(false);
  };

  const del = id => setProjects(p => p.filter(x => x.id!==id));

  const progress = proj => {
    const linked = tasks.filter(t => t.project===proj.name);
    if (!linked.length) return 0;
    return Math.round((linked.filter(t=>t.status==='Terminé').length / linked.length) * 100);
  };

  const analyzeProject = async proj => {
    if (!apiKey) {
      setAiError("⚠️ Veuillez d'abord configurer votre clé API (bouton « Clé API » en bas de la barre latérale).");
      return;
    }
    setAnalyzing(proj.id); setAiError('');
    const linked = tasks.filter(t => t.project===proj.name);
    const prompt = [
      `Nom du projet : ${proj.name}`,
      `Objectif final : ${proj.objective || 'Non défini'}`,
      `Date cible : ${fmtDate(proj.targetDate)}`,
      `Tâches liées :`,
      linked.length
        ? linked.map(t=>`  - ${t.name} (${t.status}, priorité: ${t.priority})`).join('\n')
        : '  Aucune tâche définie encore.',
    ].join('\n');

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 600,
          system: 'Tu es un coach business pour entrepreneurs africains. Analyse ce projet et donne une évaluation claire, pratique et motivante. Réponds en français. Réponds UNIQUEMENT en JSON valide, sans markdown ni backticks.',
          messages: [{
            role: 'user',
            content: prompt + '\n\nRéponds avec exactement ce format JSON :\n{"score_faisabilite": 8, "priorite_recommandee": "Haute", "prochaines_etapes": ["étape 1", "étape 2", "étape 3"], "raison": "Explication courte et motivante"}'
          }],
        }),
      });
      if (!res.ok) {
        const e = await res.json().catch(()=>({}));
        throw new Error(e.error?.message || `Erreur HTTP ${res.status}`);
      }
      const data = await res.json();
      let text = data.content?.[0]?.text || '';
      text = text.replace(/```json?|```/g,'').trim();
      const analysis = JSON.parse(text);
      setProjects(p => p.map(x => x.id===proj.id ? {...x, aiAnalysis:analysis} : x));
    } catch(e) {
      setAiError(`Erreur lors de l'analyse IA : ${e.message}`);
    } finally {
      setAnalyzing(null);
    }
  };

  const sorted = [...projects].sort((a,b) => {
    const sa = a.aiAnalysis?.score_faisabilite ?? -1;
    const sb = b.aiAnalysis?.score_faisabilite ?? -1;
    return sb - sa;
  });

  return (
    <div>
      <PageHeader title="🎯 Projets & Idées" action={<button className="btn-gold" onClick={()=>setShowForm(s=>!s)}>+ Nouveau projet</button>} />

      {aiError && (
        <div className="alert alert-red" style={{ marginBottom:16 }}>
          {aiError}
          <button className="btn-icon" style={{ marginLeft:'auto' }} onClick={()=>setAiError('')}>✕</button>
        </div>
      )}

      {showForm && (
        <div className="card" style={{ padding:20, marginBottom:20 }}>
          <h3 style={{ fontSize:16, marginBottom:16 }}>Nouveau projet / idée</h3>
          <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
            <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Nom du projet *" autoFocus />
            <textarea rows={2} value={form.objective} onChange={e=>setForm({...form,objective:e.target.value})} placeholder="Objectif final (ex : atteindre 10K abonnés)" />
            <input type="date" value={form.targetDate} onChange={e=>setForm({...form,targetDate:e.target.value})} />
          </div>
          <div style={{ display:'flex', gap:8, marginTop:16 }}>
            <button className="btn-gold" onClick={addProject}>Créer</button>
            <button className="btn-ghost" onClick={()=>{setShowForm(false);setForm(blank);}}>Annuler</button>
          </div>
        </div>
      )}

      {sorted.length===0 ? (
        <EmptyState icon="🚀" msg="Aucun projet pour l'instant." sub="Créez votre premier projet et analysez-le avec l'IA !" />
      ) : (
        sorted.map(proj => {
          const pct = progress(proj);
          const linked = tasks.filter(t => t.project===proj.name);
          const ai = proj.aiAnalysis;
          const isAnalyzing = analyzing===proj.id;
          const scoreColor = !ai ? null : ai.score_faisabilite>=7?'#4ade80':ai.score_faisabilite>=4?'#F5C518':'#f87171';

          return (
            <div key={proj.id} className="card" style={{ padding:20, marginBottom:16 }}>
              {/* Project header */}
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:12, marginBottom:14 }}>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', marginBottom:4 }}>
                    <h2 style={{ fontSize:18, margin:0 }}>{proj.name}</h2>
                    {ai && (
                      <span className="badge" style={{ background:`${scoreColor}22`, color:scoreColor, fontSize:12 }}>
                        ★ {ai.score_faisabilite}/10
                      </span>
                    )}
                    {ai?.priorite_recommandee && (
                      <span className="badge badge-yellow">{ai.priorite_recommandee}</span>
                    )}
                  </div>
                  {proj.objective && <p style={{ color:'#9ca3af', fontSize:13, margin:'0 0 4px' }}>{proj.objective}</p>}
                  {proj.targetDate && <p style={{ color:'var(--muted)', fontSize:12, margin:0 }}>🗓 Cible : {fmtDate(proj.targetDate)}</p>}
                </div>
                <div style={{ display:'flex', gap:8, flexShrink:0, flexWrap:'wrap', justifyContent:'flex-end' }}>
                  <button className="btn-gold" style={{ fontSize:12, padding:'7px 13px' }}
                    onClick={()=>analyzeProject(proj)} disabled={isAnalyzing}>
                    {isAnalyzing ? <><span className="spinner" />Analyse…</> : '🤖 Analyser avec IA'}
                  </button>
                  <button className="btn-icon" onClick={()=>del(proj.id)} title="Supprimer">✕</button>
                </div>
              </div>

              {/* Progress */}
              <div style={{ marginBottom:14 }}>
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:5 }}>
                  <span style={{ fontSize:12, color:'var(--muted)' }}>
                    {linked.length} tâche{linked.length!==1?'s':''} liée{linked.length!==1?'s':''}
                  </span>
                  <span style={{ fontSize:12, fontWeight:700, color: pct===100?'#4ade80':'#F5C518' }}>{pct}%</span>
                </div>
                <div className="progress-track">
                  <div className={`progress-fill${pct===100?' green':''}`} style={{ width:`${pct}%` }} />
                </div>
              </div>

              {/* Linked tasks chips */}
              {linked.length>0 && (
                <div style={{ marginBottom: ai ? 0 : 0 }}>
                  <p style={{ fontSize:11, color:'var(--muted)', textTransform:'uppercase', letterSpacing:.8, marginBottom:8 }}>Tâches</p>
                  <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
                    {linked.map(t=>(
                      <span key={t.id} style={{
                        background: t.status==='Terminé'?'rgba(34,197,94,.1)':'#1a2235',
                        border: `1px solid ${t.status==='Terminé'?'rgba(34,197,94,.3)':'#2d3748'}`,
                        color: t.status==='Terminé'?'#4ade80':'#9ca3af',
                        borderRadius:6, padding:'3px 10px', fontSize:12,
                      }}>
                        {t.status==='Terminé'?'✓ ':''}{t.name}
                      </span>
                    ))}
                  </div>
                </div>
              )}

              {/* AI Analysis */}
              {ai && (
                <div className="ai-block">
                  <p style={{ color:'#F5C518', fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:1, marginBottom:14 }}>
                    🤖 Analyse IA
                  </p>
                  <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14, marginBottom:14 }} className="grid-2">
                    <div>
                      <p style={{ fontSize:10, color:'var(--muted)', textTransform:'uppercase', letterSpacing:.8, marginBottom:5 }}>Score de faisabilité</p>
                      <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                        <span style={{ fontFamily:'Syne', fontWeight:800, fontSize:28, color:scoreColor }}>{ai.score_faisabilite}</span>
                        <span style={{ color:'var(--muted)', fontSize:16 }}>/10</span>
                      </div>
                    </div>
                    <div>
                      <p style={{ fontSize:10, color:'var(--muted)', textTransform:'uppercase', letterSpacing:.8, marginBottom:5 }}>Raison</p>
                      <p style={{ fontSize:13, color:'var(--text)', margin:0, lineHeight:1.5 }}>{ai.raison}</p>
                    </div>
                  </div>
                  {ai.prochaines_etapes?.length>0 && (
                    <div>
                      <p style={{ fontSize:10, color:'var(--muted)', textTransform:'uppercase', letterSpacing:.8, marginBottom:10 }}>Prochaines étapes</p>
                      {ai.prochaines_etapes.map((step,i)=>(
                        <div key={i} style={{ display:'flex', gap:10, marginBottom:8, alignItems:'flex-start' }}>
                          <span style={{ color:'#F5C518', fontFamily:'Syne', fontWeight:700, fontSize:13, flexShrink:0, marginTop:1 }}>{i+1}.</span>
                          <span style={{ fontSize:13, color:'var(--text)', lineHeight:1.5 }}>{step}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })
      )}
    </div>
  );
}

function EcoleTab({ courses, setCourses, devoirs, setDevoirs, examens, setExamens }) {
  const [sub, setSub] = useState('emploi');
  return (
    <div>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:24 }}>
        <h1 style={{ fontSize:26, fontWeight:800 }}>📚 École</h1>
        <div className="subtab-bar">
          <button className={`subtab${sub==='emploi'?' active':''}`} onClick={()=>setSub('emploi')}>📅 Emploi du temps</button>
          <button className={`subtab${sub==='devoirs'?' active':''}`} onClick={()=>setSub('devoirs')}>📝 Devoirs & Examens</button>
        </div>
      </div>
      {sub==='emploi'
        ? <EmploiDuTemps courses={courses} setCourses={setCourses} />

function EmploiDuTemps({ courses, setCourses }) {
  const blankForm = { nom:'', jour:'Lundi', heureDebut:'08:00', heureFin:'10:00', salle:'', professeur:'', color:'#6366f1' };
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState(blankForm);
  const JOURS = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const dayNow = todayDay();

  const add = () => {
    if (!form.nom.trim()) return;
    setCourses(p => [...p, { ...form, id:genId() }]);
    setForm(blankForm); setShowForm(false);
  };

  return (
    <div>
      <div style={{ display:'flex', justifyContent:'flex-end', marginBottom:18 }}>
        <button className="btn-gold" onClick={()=>setShowForm(s=>!s)}>+ Ajouter un cours</button>
      </div>

      {showForm && (
        <div className="card" style={{ padding:20, marginBottom:20 }}>
          <h3 style={{ fontSize:15, marginBottom:14 }}>Nouveau cours</h3>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:11 }} className="grid-2">
            <div style={{ gridColumn:'1/-1' }}>
              <input value={form.nom} onChange={e=>setForm({...form,nom:e.target.value})} placeholder="Nom du cours *" autoFocus />
            </div>
            <select value={form.jour} onChange={e=>setForm({...form,jour:e.target.value})}>
              {JOURS.map(j=><option key={j}>{j}</option>)}
            </select>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
              <input type="time" value={form.heureDebut} onChange={e=>setForm({...form,heureDebut:e.target.value})} />
              <input type="time" value={form.heureFin} onChange={e=>setForm({...form,heureFin:e.target.value})} />
            </div>
            <input value={form.salle} onChange={e=>setForm({...form,salle:e.target.value})} placeholder="Salle / Lieu" />
            <input value={form.professeur} onChange={e=>setForm({...form,professeur:e.target.value})} placeholder="Professeur" />
            <div style={{ gridColumn:'1/-1', display:'flex', alignItems:'center', gap:10 }}>
              <span style={{ fontSize:13, color:'var(--muted)' }}>Couleur :</span>
              {COURSE_PALETTE.map(c=>(
                <div key={c} onClick={()=>setForm({...form,color:c})}
                  style={{ width:22, height:22, borderRadius:'50%', background:c, cursor:'pointer',
                    border:`3px solid ${form.color===c?'#fff':'transparent'}`, transition:'border-color .15s' }} />
              ))}
            </div>
          </div>
          <div style={{ display:'flex', gap:8, marginTop:14 }}>
            <button className="btn-gold" onClick={add}>Ajouter</button>
            <button className="btn-ghost" onClick={()=>{setShowForm(false);setForm(blankForm);}}>Annuler</button>
          </div>
        </div>
      )}

      {/* Weekly grid */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(6,1fr)', gap:12, overflowX:'auto' }} className="grid-6">
        {JOURS.map(jour => {
          const dayCourses = courses.filter(c=>c.jour===jour).sort((a,b)=>a.heureDebut.localeCompare(b.heureDebut));
          const isToday = jour===dayNow;
          return (
            <div key={jour}>
              <div className={`cal-day-header${isToday?' today':''}`}>
                <p style={{ fontFamily:'Syne', fontWeight:700, fontSize:12,
                  color:isToday?'#F5C518':'var(--muted)', margin:0, textTransform:'uppercase', letterSpacing:.6 }}>{jour.slice(0,3)}</p>
                {isToday && <p style={{ fontSize:10, color:'#F5C518', margin:'2px 0 0' }}>Aujourd'hui</p>}
              </div>
              <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
                {dayCourses.length===0
                  ? <p style={{ color:'#2d3748', fontSize:12, textAlign:'center', padding:'12px 0' }}>—</p>
                  : dayCourses.map(c=>(
                    <div key={c.id} style={{
                      background:`${c.color}18`, border:`1px solid ${c.color}35`,
                      borderLeft:`3px solid ${c.color}`, borderRadius:8, padding:'8px 10px',
                    }}>
                      <p style={{ fontWeight:600, fontSize:12, color:c.color, margin:'0 0 2px', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{c.nom}</p>
                      <p style={{ fontSize:11, color:'var(--muted)', margin:0 }}>{c.heureDebut}–{c.heureFin}</p>
                      {c.salle && <p style={{ fontSize:10, color:'var(--muted)', margin:'2px 0 0' }}>📍 {c.salle}</p>}
                      <button style={{ background:'none', border:'none', color:'var(--muted)', cursor:'pointer', fontSize:10, marginTop:4, padding:0 }}
                        onClick={()=>setCourses(p=>p.filter(x=>x.id!==c.id))}>✕ retirer</button>
                    </div>
                  ))
                }
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function DevoirsExamens({ devoirs, setDevoirs, examens, setExamens }) {
  const blankD = { matiere:'', description:'', dateRendu:'', statut:'À faire', priorite:'Important' };
  const blankE = { matiere:'', date:'', heure:'08:00', salle:'', chapitres:'', totalChapitres:3, chapitresRevises:0 };
  const [showDForm, setShowDForm] = useState(false);
  const [showEForm, setShowEForm] = useState(false);
  const [dForm, setDForm] = useState(blankD);
  const [eForm, setEForm] = useState(blankE);

  const addDevoir = () => {
    if (!dForm.matiere.trim()) return;
    setDevoirs(p=>[...p,{...dForm,id:genId()}]);
    setDForm(blankD); setShowDForm(false);
  };

  const addExamen = () => {
    if (!eForm.matiere.trim()) return;
    setExamens(p=>[...p,{...eForm,id:genId(),totalChapitres:+eForm.totalChapitres,chapitresRevises:+eForm.chapitresRevises}]);
    setEForm(blankE); setShowEForm(false);
  };

  const sortedDevoirs = [...devoirs].sort((a,b)=>new Date(a.dateRendu)-new Date(b.dateRendu));
  const sortedExamens = [...examens].sort((a,b)=>new Date(a.date)-new Date(b.date));

  return (
    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:24 }} className="grid-2">

      {/* ---- Devoirs ---- */}
      <div>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
          <h3 style={{ fontSize:16 }}>📋 Devoirs</h3>
          <button className="btn-gold" style={{ fontSize:12, padding:'7px 13px' }} onClick={()=>setShowDForm(s=>!s)}>+ Ajouter</button>
        </div>

        {showDForm && (
          <div className="card" style={{ padding:16, marginBottom:14 }}>
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              <input value={dForm.matiere} onChange={e=>setDForm({...dForm,matiere:e.target.value})} placeholder="Matière *" autoFocus />
              <input value={dForm.description} onChange={e=>setDForm({...dForm,description:e.target.value})} placeholder="Description du devoir" />
              <input type="date" value={dForm.dateRendu} onChange={e=>setDForm({...dForm,dateRendu:e.target.value})} />
              <select value={dForm.priorite} onChange={e=>setDForm({...dForm,priorite:e.target.value})}>
                <option>Critique</option><option>Important</option><option>Optionnel</option>
              </select>
              <div style={{ display:'flex', gap:8 }}>
                <button className="btn-gold" style={{ fontSize:13 }} onClick={addDevoir}>Ajouter</button>
                <button className="btn-ghost" style={{ fontSize:13 }} onClick={()=>{setShowDForm(false);setDForm(blankD);}}>Annuler</button>
              </div>
            </div>
          </div>
        )}

        {sortedDevoirs.length===0
          ? <EmptyState icon="🎉" msg="Aucun devoir enregistré." sub="Profitez-en !" />
          : sortedDevoirs.map(d=>{
            const due = daysUntil(d.dateRendu);
            return (
              <div key={d.id} className="card" style={{ padding:'12px 14px', marginBottom:8,
                borderLeft:`3px solid ${due<0?'#f87171':due<=2?'#f87171':due<=7?'#F5C518':'var(--border)'}` }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8 }}>
                  <div style={{ flex:1 }}>
                    <div style={{ display:'flex', gap:6, alignItems:'center', flexWrap:'wrap', marginBottom:3 }}>
                      <span style={{ fontWeight:600, fontSize:14 }}>{d.matiere}</span>
                      {due<0 && <span className="badge badge-red">En retard</span>}
                      {due>=0&&due<=2 && <span className="badge badge-red">J-{due}</span>}
                      {due>2&&due<=7 && <span className="badge badge-yellow">J-{due}</span>}
                    </div>
                    {d.description && <p style={{ fontSize:13, color:'#9ca3af', margin:'0 0 3px' }}>{d.description}</p>}
                    {d.dateRendu && <p style={{ fontSize:12, color:'var(--muted)', margin:0 }}>📅 À rendre : {fmtDate(d.dateRendu)}</p>}
                  </div>
                  <div style={{ display:'flex', flexDirection:'column', gap:5, alignItems:'flex-end', flexShrink:0 }}>
                    <select value={d.statut} style={{ width:'auto', fontSize:12, padding:'4px 8px' }}
                      onChange={e=>setDevoirs(p=>p.map(x=>x.id===d.id?{...x,statut:e.target.value}:x))}>
                      <option>À faire</option><option>En cours</option><option>Rendu</option>
                    </select>
                    <button className="btn-icon" style={{ fontSize:12 }} onClick={()=>setDevoirs(p=>p.filter(x=>x.id!==d.id))}>✕</button>
                  </div>
                </div>
              </div>
            );
          })
        }
      </div>

      {/* ---- Examens ---- */}
      <div>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
          <h3 style={{ fontSize:16 }}>🎓 Examens</h3>
          <button className="btn-gold" style={{ fontSize:12, padding:'7px 13px' }} onClick={()=>setShowEForm(s=>!s)}>+ Ajouter</button>
        </div>

        {showEForm && (
          <div className="card" style={{ padding:16, marginBottom:14 }}>
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              <input value={eForm.matiere} onChange={e=>setEForm({...eForm,matiere:e.target.value})} placeholder="Matière *" autoFocus />
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                <input type="date" value={eForm.date} onChange={e=>setEForm({...eForm,date:e.target.value})} />
                <input type="time" value={eForm.heure} onChange={e=>setEForm({...eForm,heure:e.target.value})} />
              </div>
              <input value={eForm.salle} onChange={e=>setEForm({...eForm,salle:e.target.value})} placeholder="Salle" />
              <input value={eForm.chapitres} onChange={e=>setEForm({...eForm,chapitres:e.target.value})} placeholder="Chapitres à réviser (ex: Tri, Graphes)" />
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                <input type="number" min={1} value={eForm.totalChapitres}
                  onChange={e=>setEForm({...eForm,totalChapitres:e.target.value})} placeholder="Total chapitres" />
                <input type="number" min={0} value={eForm.chapitresRevises}
                  onChange={e=>setEForm({...eForm,chapitresRevises:e.target.value})} placeholder="Chapitres révisés" />
              </div>
              <div style={{ display:'flex', gap:8 }}>
                <button className="btn-gold" style={{ fontSize:13 }} onClick={addExamen}>Ajouter</button>
                <button className="btn-ghost" style={{ fontSize:13 }} onClick={()=>{setShowEForm(false);setEForm(blankE);}}>Annuler</button>
              </div>
            </div>
          </div>
        )}

        {sortedExamens.length===0
          ? <EmptyState icon="📖" msg="Aucun examen planifié." sub="Bonne période !" />
          : sortedExamens.map(e=>{
            const due = daysUntil(e.date);
            const total = +e.totalChapitres || 1;
            const revus = Math.min(+e.chapitresRevises||0, total);
            const pct = Math.round((revus/total)*100);
            return (
              <div key={e.id} className="card" style={{ padding:'13px 14px', marginBottom:8,
                borderLeft:`3px solid ${due>=0&&due<=7?'#F5C518':due<0?'#2d3748':'var(--border)'}` }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:8 }}>
                  <div>
                    <div style={{ display:'flex', gap:6, alignItems:'center', marginBottom:3 }}>
                      <span style={{ fontWeight:600, fontSize:14 }}>{e.matiere}</span>
                      {due>=0&&due<=7  && <span className="badge badge-yellow">J-{due}</span>}
                      {due>=0&&due<=2  && <span className="badge badge-red">URGENT</span>}
                      {due<0          && <span className="badge badge-gray">Passé</span>}
                    </div>
                    <p style={{ fontSize:12, color:'var(--muted)', margin:0 }}>
                      📅 {fmtDate(e.date)} à {e.heure}{e.salle&&` · 📍 ${e.salle}`}
                    </p>
                    {e.chapitres && <p style={{ fontSize:12, color:'#9ca3af', margin:'3px 0 0' }}>📖 {e.chapitres}</p>}
                  </div>
                  <button className="btn-icon" onClick={()=>setExamens(p=>p.filter(x=>x.id!==e.id))}>✕</button>
                </div>

                {/* Revision tracker */}
                <div>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:5 }}>
                    <span style={{ fontSize:11, color:'var(--muted)' }}>Révision</span>
                    <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                      <button className="btn-icon" style={{ width:22, height:22, background:'#1f2937', fontSize:13, borderRadius:5 }}
                        onClick={()=>setExamens(p=>p.map(x=>x.id===e.id?{...x,chapitresRevises:Math.max(0,revus-1)}:x))}>−</button>
                      <span style={{ fontSize:12, fontWeight:700, color:'#F5C518', minWidth:40, textAlign:'center' }}>{revus}/{total}</span>
                      <button className="btn-icon" style={{ width:22, height:22, background:'#1f2937', fontSize:13, borderRadius:5 }}
                        onClick={()=>setExamens(p=>p.map(x=>x.id===e.id?{...x,chapitresRevises:Math.min(total,revus+1)}:x))}>+</button>
                    </div>
                  </div>
                  <div className="progress-track">
                    <div className={`progress-fill${pct===100?' green':''}`} style={{ width:`${pct}%` }} />
                  </div>
                </div>
              </div>
            );
          })
        }
      </div>
    </div>
  );
}
